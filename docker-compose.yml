services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: honeydo
      POSTGRES_PASSWORD: honeydo_dev
      POSTGRES_DB: honeydo_iq
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U honeydo -d honeydo_iq"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
